name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (leave blank to use the pom version)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage jar
        run: cp target/Teleport.jar "Teleport-${{ steps.version.outputs.version }}.jar"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Teleport v${{ steps.version.outputs.version }}"
          files: "Teleport-${{ steps.version.outputs.version }}.jar"
          generate_release_notes: true
